version: 1

sites:
  mts_internet_online:
    title: "МТС Интернет"
    enabled: true
    base_domain: "mts-internet.online"

    urls:
      no_region: "https://mts-internet.online/"
      moscow_subdomain: "https://moskva.mts-internet.online/"
      balashikha_folder: "https://mts-internet.online/balashiha"
      domodedovo_folder: "https://mts-internet.online/domodedovo"

    expected_regions:
      no_region: null
      moscow_subdomain: "Москва"
      balashikha_folder: "Балашиха"
      domodedovo_folder: "Домодедово"

    allowed_region_pool:
      - "Москва"
      - "Московская область"
      - "Балашиха"
      - "Домодедово"

    # Form requirement policy per landing URL type.
    # If a form is listed here, its absence is treated as a failure even if form.optional=true.
    # Forms not listed here follow forms.yaml optional flag.
    required_forms_by_url_type:
      no_region:
        - "profit"
        - "connection"
        - "checkaddress"
      moscow_subdomain:
        - "profit"
        - "connection"
        - "checkaddress"
      balashikha_folder:
        - "profit"
        - "connection"
        - "checkaddress"
      domodedovo_folder:
        - "profit"
        - "connection"
        - "checkaddress"

    regional_navigation_chain:
      - step: "open_without_region"
        url_type: "no_region"
        expected_url: "https://mts-internet.online/"
        expected_region: null

      - step: "go_to_moscow"
        expected_url: "https://moskva.mts-internet.online/"
        expected_region: "Москва"

      - step: "go_to_balashikha"
        expected_url: "https://mts-internet.online/balashiha"
        expected_region: "Балашиха"

      - step: "go_to_domodedovo"
        expected_url: "https://mts-internet.online/domodedovo"
        expected_region: "Домодедово"

    notes:
      - "Смена региона внутри формы не должна менять текущий URL страницы."
      - "Региональная навигация страницы проверяется отдельным сценарием."
      - "Для региональной навигации cookie testNewAddressPoisk не должна изменяться."
