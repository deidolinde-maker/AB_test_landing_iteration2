[pytest]
addopts = -ra --strict-markers -p no:cacheprovider
norecursedirs = pytest-cache-files-* __pycache__
markers =
    e2e: browser end-to-end scenarios
    smoke: smoke checks
    submit_applications: iteration 2 submit application scenarios
    form_open_smoke: required form open smoke checks
    json_store_smoke: application json store smoke checks
    submit_success_marker_smoke: success marker parsing smoke checks
    mini_bug_report_smoke: mini bug report rendering smoke checks
    ab_cookie: AB cookie checks
    variant_a: tests forced to variant A
    variant_b: tests forced to variant B
    isolation: old/v2 address isolation checks
    adjacent: adjacent region search checks
    forbidden_region: forbidden region negative checks
    synonyms: synonym search checks
    region_change: region change inside form checks
    regional_navigation: page regional navigation chain checks
